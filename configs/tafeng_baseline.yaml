# Baseline Model Configuration for Ta-Feng Dataset
# Simple LSTM baseline for next-item recommendation

defaults:
  - base

# Dataset
dataset:
  name: tafeng
  data_dir: data/raw/
  processed_dir: data/processed/tafeng/
  cache_dir: data/cache/tafeng/
  min_item_frequency: 2   # Filter items appearing less than 2 times
  split_method: 'leave_one_out'  # Options: 'leave_one_out' (default), 'cv10', 'ratio'
                                # leave_one_out: last->test, second_last->val, others->train
                                # cv10: 10-fold cross-validation (paper-aligned, use configs/tafeng_cv.yaml)

# Model Configuration
model:
  # Baseline LSTM
  # **Paper-Aligned**: Section 7.3 - hidden_size = 128, num_layers = 4
  embed_dim: 64
  hidden_dim: 128            # Paper: hidden_size = 128
  num_layers: 4              # Paper: num_layers = 4 (updated from 2)
  dropout: 0.2
  max_seq_length: 50

# Training
training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 20
  early_stop_patience: 5
  metric_for_best: 'NDCG@20'  # Paper-aligned: use NDCG@20 (main table metric)
  num_workers: 4

# Evaluation
evaluation:
  k_values: [1, 5, 10, 15, 20, 50]
  batch_size: 256

# STB (not used for baseline, but kept for compatibility)
stb:
  stb_scores_path: outputs/phase3_stb/checkpoints/stb_scores.npy
  motivation_labels_path: outputs/phase3_stb/checkpoints/motivation_labels.npy

# Output paths (for baseline)
logging:
  log_dir: outputs/phase1_baseline/logs/
  checkpoint_dir: outputs/phase1_baseline/checkpoints/
  prediction_dir: outputs/phase1_baseline/predictions/

# Results
results:
  output_dir: outputs/phase1_baseline/results/
  model_type: baseline

# Reproducibility
seed: 42
deterministic: true
