# UPSTAR Evaluation Configuration for Ta-Feng Dataset
#
# LEGEND:
#   [PAPER]  = value directly from or implied by the paper
#   [ENG]    = engineering decision / safe default

defaults:
  - base

# ─────────────────────────────────────────────────────────────────────────
# Dataset
# ─────────────────────────────────────────────────────────────────────────
dataset:
  name: tafeng
  data_dir: data/raw/
  processed_dir: data/processed/tafeng/
  cache_dir: data/cache/tafeng/

# ─────────────────────────────────────────────────────────────────────────
# Model (must match training checkpoint)
# ─────────────────────────────────────────────────────────────────────────
model:
  embed_dim: 64              # [PAPER] Section 7.3
  hidden_dim: 128           # [PAPER] Section 7.3
  num_layers: 4             # [PAPER] Section 7.3
  dropout: 0.2
  use_gate: true            # Per-dim fusion gate
  max_seq_length: 50

# ─────────────────────────────────────────────────────────────────────────
# Evaluation settings
# ─────────────────────────────────────────────────────────────────────────
evaluation:
  # k values: paper main table reports P@5, P@20, NDCG@5, NDCG@20, MRR@5, MRR@20
  k_values: [1, 5, 10, 15, 20, 50]
  batch_size: 256

  # Main results table (matches paper Table 2/3 format)
  main_metrics:
    - Precision@5
    - Precision@20
    - NDCG@5
    - NDCG@20
    - MRR@5
    - MRR@20

  # Output formats
  output_formats:
    - json
    - csv
    - txt
    # - latex  # Uncomment for LaTeX output
    # - markdown  # Uncomment for Markdown output

# ─────────────────────────────────────────────────────────────────────────
# Phase 3: STB results
# ─────────────────────────────────────────────────────────────────────────
stb:
  stb_scores_path: outputs/phase3_stb/checkpoints/stb_scores.npy
  motivation_labels_path: outputs/phase3_stb/checkpoints/motivation_labels.npy

# ─────────────────────────────────────────────────────────────────────────
# Training (for cross-validation / loss monitoring)
# ─────────────────────────────────────────────────────────────────────────
training:
  # Optimization — must match training config
  optimizer: adam            # [PAPER] Section 7.4
  learning_rate: 0.0003    # [PAPER] Section 7.4
  weight_decay: 0.00001
  batch_size: 64           # [PAPER] Section 7.4

  # Training schedule
  max_epochs_per_stage: 10  # [ENG]
  early_stop_patience: 3   # [ENG]
  metric_for_best: 'NDCG@20'  # [PAPER] main table metric

  # Loss weights — must match training config
  # L_total = 1.0*L_global + 0.7*L_S&E&O + 1.0*L_orth + 1.0*L_distill
  lambda_global: 1.0       # [PAPER]
  lambda_branch: 0.7        # [PAPER] λ = 0.7
  lambda_ortho: 1.0        # [PAPER] τ_s, τ_e inside L_orth
  lambda_distill: 1.0       # [ENG]

  # Stage 4 configuration (all losses enabled)
  stage4:
    use_global_loss: true
    use_branch_loss: true
    use_orthogonality_loss: true
    use_distillation_loss: true

  # L_orth parameters
  tau_s: 0.5               # [PAPER] Section 3.3
  tau_e: 0.5               # [PAPER] Section 3.3

  # L_distill parameters
  distill_temperature: 3.0   # [ENG]
  distill_lambda: 0.7       # [PAPER] Section 3.3

# ─────────────────────────────────────────────────────────────────────────
# Cross-validation
# ─────────────────────────────────────────────────────────────────────────
cross_validation:
  num_folds: 10             # [ENG]
  random_seed: 42

# ─────────────────────────────────────────────────────────────────────────
# Checkpoint
# ─────────────────────────────────────────────────────────────────────────
checkpoint:
  path: null               # Override with actual checkpoint path for evaluation
  checkpoint_dir: outputs/phase4_upstar/checkpoints/

# ─────────────────────────────────────────────────────────────────────────
# Output
# ─────────────────────────────────────────────────────────────────────────
logging:
  log_dir: outputs/logs/evaluation/
  eval_dir: outputs/results/evaluation/
  cv_dir: outputs/results/cross_validation/

# ─────────────────────────────────────────────────────────────────────────
# Reproducibility
# ─────────────────────────────────────────────────────────────────────────
seed: 42
deterministic: true
