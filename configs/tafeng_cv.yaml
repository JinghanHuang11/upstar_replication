# Ta-Feng Dataset Configuration for 10-Fold Cross-Validation
#
# This config aligns with the paper's experimental protocol:
# - Uses 10-fold cross-validation instead of leave-one-out
# - Preserves timestamps for day-level item-time graph construction
# - Each user appears in only one fold (user-level CV)
#
# Paper Reference: UPSTAR, Section 7 (Experimental Setup)

defaults:
  - base

# Dataset
dataset:
  name: tafeng
  data_dir: data/raw/
  processed_dir: data/processed/tafeng/
  cache_dir: data/cache/tafeng/
  min_item_frequency: 2

  # **NEW**: 10-fold cross-validation split
  split_method: 'cv10'  # Options: 'leave_one_out' (default), 'cv10', 'ratio'
                        # cv10 = 10-fold cross-validation (paper-aligned)
  num_folds: 10
  cv_random_seed: 42  # For reproducible user shuffling

# Model Configuration (Baseline LSTM)
model:
  embed_dim: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2
  max_seq_length: 50

# Training
training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 20
  early_stop_patience: 5
  metric_for_best: 'NDCG@10'
  num_workers: 4

# Evaluation
evaluation:
  k_values: [1, 5, 10, 15, 20, 50]
  batch_size: 256

# Output paths
logging:
  log_dir: outputs/phase1_baseline/logs/
  checkpoint_dir: outputs/phase1_baseline/checkpoints/
  prediction_dir: outputs/phase1_baseline/predictions/

# Results
results:
  output_dir: outputs/phase1_baseline/results/
  model_type: baseline

# Reproducibility
seed: 42
deterministic: true
