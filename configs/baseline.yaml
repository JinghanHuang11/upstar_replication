# Baseline LSTM configuration

defaults:
  - base

dataset:
  name: baseline
  data_dir: data/raw/baseline/
  processed_dir: data/processed/baseline/

# Model
model:
  max_seq_length: 50
  embed_dim: 64
  hidden_dim: 128
  num_layers: 2
  dropout: 0.2

# Training
training:
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.00001
  max_epochs: 50
  early_stop_patience: 10
  metric_for_best: 'NDCG@10'
  num_workers: 4

# This is a simple baseline model for next-item recommendation
# Phase 1 only: No STB, no Item-GNN, no multi-path modeling